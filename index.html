<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mi Primera Página</title>
    <style>
        body {
            background-color: #f0f8ff; 
            font-family: 'Arial', sans-serif; 
            margin: 0;
            padding: 20px;
            color: #333; 
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-family: 'Georgia', serif; 
            color: #2e8b57; 
        }

        main {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background-color: #ffffff; 
            border-radius: 10px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
        }

        p {
            font-size: 1.2em;
            line-height: 1.5;
        }

        .boton {
            background-color: #4CAF50; 
            color: white; 
            border: none;
            padding: 12px 24px;
            font-size: 1em;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
        }

        .boton:hover {
            background-color: #45a049;
            transform: scale(1.05);
        }

        .boton:active {
            background-color: #3e8e41;
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <header>
        <h1>Bienvenidos</h1>
    </header>
    <main>
        <p>Esta es una página sencilla creada con HTML y CSS.</p>
        <button class="boton">Click Aquí</button>
    </main>
</body>
</html>
